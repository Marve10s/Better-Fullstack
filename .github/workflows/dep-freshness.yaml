name: Dependency Freshness Check

on:
  schedule:
    - cron: "0 8 * * 3" # Wednesdays at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-versions:
    name: Check Template Dependency Versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Check All Ecosystems
        run: bun run scripts/check-dep-versions.ts 2>&1 | tee dep-report.txt

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dep-freshness-report
          path: dep-report.txt
