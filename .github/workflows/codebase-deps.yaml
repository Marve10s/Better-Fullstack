name: Codebase Dependency Update

on:
  schedule:
    # Run every Monday at 10am UTC
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      update_mode:
        description: "Update mode"
        type: choice
        options:
          - patch-minor
          - all
        default: "patch-minor"

concurrency:
  group: codebase-deps
  cancel-in-progress: true

jobs:
  update:
    name: Update Workspace Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve Update Mode
        id: mode
        run: |
          MODE="${{ inputs.update_mode }}"
          if [ -z "$MODE" ]; then
            MODE="patch-minor"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"

      - name: Install Dependencies
        run: bun install

      - name: Update Dependencies
        run: |
          # --latest bumps version specifiers in package.json (not just lockfile)
          # Both modes use --latest; "patch-minor" is enforced by the npm
          # query below which reverts any major bumps.
          bun update --recursive --latest

      - name: Revert Major Bumps (patch-minor mode)
        if: steps.mode.outputs.mode == 'patch-minor'
        run: |
          # Restore any package.json version specifiers that jumped a major
          # by comparing against the committed versions on this branch.
          git diff --name-only -- '*/package.json' 'package.json' | while IFS= read -r f; do
            if [ -f "$f" ]; then
              node -e "
                const fs = require('fs');
                const { execSync } = require('child_process');
                const current = JSON.parse(fs.readFileSync('$f', 'utf-8'));
                let original;
                try {
                  original = JSON.parse(execSync('git show HEAD:$f', { encoding: 'utf-8' }));
                } catch { process.exit(0); }
                let reverted = false;
                for (const key of ['dependencies', 'devDependencies']) {
                  const orig = original[key] || {};
                  const curr = current[key] || {};
                  for (const [pkg, oldVer] of Object.entries(orig)) {
                    const newVer = curr[pkg];
                    if (!newVer || newVer === oldVer) continue;
                    const oldMajor = parseInt(String(oldVer).replace(/^[\\^~>=<]+/, ''));
                    const newMajor = parseInt(String(newVer).replace(/^[\\^~>=<]+/, ''));
                    if (!isNaN(oldMajor) && !isNaN(newMajor) && newMajor > oldMajor) {
                      curr[pkg] = oldVer;
                      reverted = true;
                    }
                  }
                }
                if (reverted) {
                  fs.writeFileSync('$f', JSON.stringify(current, null, 2) + '\n');
                }
              "
            fi
          done
          # Re-install to fix lockfile after any reverts
          bun install

      - name: Disable Git Hooks For Automation Commit
        run: git config core.hooksPath /dev/null

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update codebase dependencies"
          title: "chore(deps): update codebase dependencies"
          body: |
            ## Codebase Dependency Updates

            This PR updates workspace dependencies used by the repository codebase (`package.json` + `bun.lock`).

            - Update mode: `${{ steps.mode.outputs.mode }}`
            - Scope: root + all Bun workspaces (`--recursive`)

            ---
            *Automated by [codebase-deps.yaml](.github/workflows/codebase-deps.yaml)*
          branch: deps/codebase-updates
          delete-branch: true
          labels: |
            dependencies
            automated
